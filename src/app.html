<!doctype html>
<html
  lang="en"
  class="bg-base font-jetbrains-mono text-text selection:bg-accent/30 selection:text-accent/80 caret-accent scrollbar min-h-screen"
>
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta property="og:locale" content="en_US" />

    <!-- Preload critical fonts for better performance -->
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/jetbrains-mono-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />
    <link
      rel="preload"
      href="%sveltekit.assets%/fonts/jetbrains-mono-latin-700-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin="anonymous"
    />

    <!-- Load fonts with optimal font-display -->
    <style>
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-display: swap;
        font-weight: 400;
        src: url("%sveltekit.assets%/fonts/jetbrains-mono-latin-400-normal.woff2")
          format("woff2");
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC,
          U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191,
          U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
      @font-face {
        font-family: "JetBrains Mono";
        font-style: normal;
        font-display: swap;
        font-weight: 700;
        src: url("%sveltekit.assets%/fonts/jetbrains-mono-latin-700-normal.woff2")
          format("woff2");
        unicode-range:
          U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC,
          U+0304, U+0308, U+0329, U+2000-206F, U+2074, U+20AC, U+2122, U+2191,
          U+2193, U+2212, U+2215, U+FEFF, U+FFFD;
      }
    </style>

    <script data-theme-init>
      (() => {
        try {
          const safeParse = (raw) => {
            if (!raw) return null;
            try {
              return JSON.parse(raw);
            } catch {
              return raw;
            }
          };

          const storedPalette = safeParse(localStorage.getItem("palette"));
          const storedAccent = safeParse(localStorage.getItem("accent"));

          const palette =
            storedPalette ??
            (window.matchMedia("(prefers-color-scheme: light)").matches
              ? "latte"
              : "mocha");
          if (palette) {
            document.documentElement.classList.add(palette);
          }

          const accent = storedAccent ?? "peach";
          document.documentElement.style.setProperty(
            "--current-accent-color",
            `var(--color-${accent})`,
          );
        } catch (error) {
          console.warn("Theme bootstrapping failed", error);
        }
      })();
    </script>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div>%sveltekit.body%</div>
  </body>
</html>
